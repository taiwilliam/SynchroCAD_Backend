name: Simple Deploy to EC2

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 只有當 push 到 master 分支時才執行部署
    if: github.ref == 'refs/heads/master'
    
    steps:
      - name: 透過 SSH 連線並部署
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /opt/apps/SynchroCAD_Backend

            # 顯示部署前 commit
            echo "部署前 commit: $(git rev-parse --short HEAD)"
            
            # 1. 拉取最新原始碼 (包含 Dockerfile 和 docker-compose.yml)
            git pull --ff-only origin master

            # 顯示部署後 commit
            echo "部署後 commit: $(git rev-parse --short HEAD)"
            
            # 2. 在 EC2 本地編譯並啟動
            # --build 會自動偵測程式碼變動並重新製作 Image
            docker compose up -d --build --remove-orphans
            
            # 3. 執行資料庫遷移
            docker compose exec -T backend flask --app wsgi.py db upgrade

            # 4. 基本健康檢查（失敗會讓 workflow 失敗）
            docker compose ps
            curl -fsS http://localhost > /dev/null
            
            echo "部署成功！"