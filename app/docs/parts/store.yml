tags:
  - Parts
summary: 新增零件
requestBody:
  required: true
  content:
    application/json:
      schema:
        $ref: '../schemas/part_input.yml'
responses:
  201:
    description: Part created successfully
    schema:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Part created successfully
        data:
          $ref: '../schemas/part.yml'
  400:
    description: Invalid input
    schema:
      type: object
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: Invalid input
